services:
    redis:
        image: redis:7.2.5-alpine
        container_name: ltser-changhua-redis
        restart: unless-stopped
        volumes:
            - ltser_redis_data:/data

    celery:
        build:
            context: .
        container_name: ltser-changhua-celery
        restart: unless-stopped
        command: celery -A ltserChanghua worker -l info
        env_file:
            - .env
        environment:
            ENV_FILE: .env
            REDIS_URL: redis://redis:6379/0
            CELERY_BROKER_URL: redis://redis:6379/0
            CELERY_RESULT_BACKEND: django-db
        depends_on:
            - redis

    n8n:
        image: docker.n8n.io/n8nio/n8n:2.1.4
        container_name: ltser-changhua-n8n
        restart: unless-stopped
        ports:
            - "127.0.0.1:5678:5678"
        environment:
            TZ: ${N8N_TZ}
            GENERIC_TIMEZONE: ${N8N_GENERIC_TIMEZONE}
            N8N_HOST: ${N8N_HOST}
            N8N_PORT: ${N8N_PORT}
            N8N_PROTOCOL: ${N8N_PROTOCOL}
            N8N_PATH: ${N8N_PATH}
            N8N_EDITOR_BASE_URL: ${N8N_EDITOR_BASE_URL}
            WEBHOOK_URL: ${N8N_WEBHOOK_URL}
            N8N_PROXY_HOPS: ${N8N_PROXY_HOPS}
        volumes:
            - ltser_changhua_n8n_data:/home/node/.n8n
        depends_on:
            - redis

volumes:
    ltser_redis_data:
    ltser_changhua_n8n_data:
